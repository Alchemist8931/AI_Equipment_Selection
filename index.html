<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AI Equipment Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #f8f9fa;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --accent: #000000;
      --accent-hover: #333333;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --tab-bg: #e8e8e8;
      --tab-active: #ffffff;
      --form-width: 900px;
      --form-height: 900px;
      --overlay-width: 385px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100vw; 
      height: 100vh; 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      overflow: hidden !important; 
      position: relative; 
      font-family: 'SN Pro', sans-serif;
    }

    .glass3d {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    /* Preloader */
    #preloader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; z-index: 9999; }
    #preloader.visible { opacity: 1; visibility: visible; }
    #preloader.fade-out { opacity: 0; visibility: hidden; }
    .line { width: 10px; height: 70px; background-color: var(--accent); animation: bounce 1.5s infinite ease-in-out; border-radius: 4px; }
    .line:nth-child(2) { animation-delay: 0.3s; }
    .line:nth-child(3) { animation-delay: 0.6s; }
    .line:nth-child(5) { animation-delay: 1.2s; }
    @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); } }

    /* Login/Register */
    #login-wrapper { opacity: 0; transition: opacity 0.5s ease; width: 100%; height: 100%; position: relative; z-index: 100; pointer-events: none; }
    #login-wrapper.show { opacity: 1; pointer-events: auto; }
    .container { width: var(--form-width); height: var(--form-height); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 16px; overflow: hidden; position: relative; z-index: 100; border: 1px solid var(--border-color); background: var(--bg-card); }
    .overlay { position: absolute; top: 0; left: 0; width: var(--overlay-width); height: 100%; background: var(--accent); border-radius: 16px 0 0 16px; transition: left 1s ease; z-index: 9999 !important; pointer-events: auto !important; }
    .overlay.open-sign-up { left: calc(var(--form-width) - var(--overlay-width)); border-radius: 0 16px 16px 0; }
    .overlay .sign-in, .overlay .sign-up { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px; display: flex; flex-direction: column; justify-content: center; gap: 15px; transition: opacity 0.5s; pointer-events: auto; z-index: 10000; color: #fff; }
    .overlay .sign-in { opacity: 1; pointer-events: auto; }
    .overlay .sign-up { opacity: 0; pointer-events: none; }
    .overlay.open-sign-up .sign-in { opacity: 0; pointer-events: none; }
    .overlay.open-sign-up .sign-up { opacity: 1; pointer-events: auto; }
    .form { position: absolute; top: 0; left: var(--overlay-width); width: calc(var(--form-width) - var(--overlay-width)); height: 100%; z-index: 500; display: flex; }
    .form .sign-in, .form .sign-up { width: 50%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; opacity: 0; transition: opacity 0.5s; z-index: 500; }
    .form .sign-in.show { display: flex; opacity: 1; }
    .form .sign-up.show { display: flex; opacity: 1; }
    
    .modalFORM { display: flex; flex-direction: column; gap: 20px; background: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; width: 380px; border-radius: 12px; z-index: 200; }
    .modalFORM h3 { font-size: 22px; font-weight: 600; text-align: center; text-transform: uppercase; color: var(--text-primary); margin: 0; }
    
    .inputField { width: 98%; padding: 12px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); outline: none; transition: all 0.3s ease; color: var(--text-primary); }
    .inputField:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }
    .inputField::placeholder { color: var(--text-muted); }
    
    .button-submit { width: 100%; padding: 12px; background: var(--accent); border: none; color: #fff; font-size: 14px; font-weight: 600; border-radius: 8px; height: 40px; cursor: pointer; transition: all 0.4s; }
    .button-submit:hover { background: var(--accent-hover); }
    
    .button-submit2 { padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 14px; font-weight: 600; border-radius: 8px; height: 40px; width: 100%; cursor: pointer; transition: all 0.4s; margin-top: 26px; }
    .button-submit2:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    /* DB Disconnect */
    #db-disconnect-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 2000; }
    #db-disconnect-overlay.show { opacity: 1; pointer-events: auto; }
    .loading-bar { background-color: var(--error); }

    #home_wave { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; opacity: 0.4; }
    
    /* Modal 9 App Styles */
    .spec-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; z-index: 10; }
    .spec-modal.visible { opacity: 1; visibility: visible; }

    /* Top Window - Single Row Layout */
    .modal9-top-window { 
      color: var(--text-primary); 
      position: fixed; 
      top: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: 1520px; 
      height: 60px; /* Reduced height */
      padding: 10px 15px; 
      box-sizing: border-box; 
      z-index: 30; 
    }
    
    /* Flex container for single row */
    .modal9-top-body { 
      display: flex; 
      flex-direction: row; 
      align-items: center; 
      gap: 15px; 
      height: 100%; 
    }

    /* Tabs (Hidden via CSS but kept in DOM if needed, or remove if not used. Assuming used for page switching) */
    nav.nav_copy { display: none; } /* Hidden as per request to unify top bar, or can be shown if part of the row. Assuming hidden for cleaner look based on 'single line' request. */
    
    .spec-history-list { width: 100%; margin-top: 0; overflow-x: auto; overflow-y: hidden; height: 100%; }
    .spec-history-item { display:flex; justify-content:space-between; padding:4px 8px; transition: background 0.2s; border-radius: 4px; }
    .spec-history-item:hover { background: var(--bg-primary); }
    
    .history-controls { width:100%; display:flex; justify-content:center; margin-top:8px; }
    .history-load-more { min-width:200px; display:inline-flex; align-items:center; justify-content:center; }

    .input-container { position: relative; width: auto; flex-shrink: 0; }
    .status-field-wrapper { display: inline-flex; align-items: center; gap: 6px; }
    .status-icon { font-family: 'Material Symbols Outlined'; font-size: 20px; line-height: 1; color: var(--text-muted); transition: color 0.3s ease; user-select: none; }
    .input-container.overflow::after { content: ''; position: absolute; top: 0; right: 0; width: 20px; height: 100%; pointer-events: none; background: linear-gradient(to left, var(--bg-card), transparent); }
    
    .styled_input_bar { width: auto; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary); outline: none; transition: all 0.3s ease; box-sizing: border-box; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .styled_input_bar::placeholder { color: var(--text-muted); transition: all 0.3s ease; }
    .styled_input_bar:hover { border-color: var(--text-muted); }
    .styled_input_bar:focus { border-color: var(--accent); background: #fff; }
    
    .input-label { position: absolute; left: 10px; top: 10px; transform: translateY(-50%); font-size: 10px; background-color: var(--bg-primary); color: var(--text-muted); pointer-events: none; transition: all 0.3s ease; padding: 0 4px; }
    .styled_input_bar:hover + .input-label, .styled_input_bar:not(:placeholder-shown) + .input-label { top: 0; left: 10px; font-size: 10px; color: var(--text-secondary); background-color: var(--bg-card); }
    
    .spec-history-item.input-row { gap: 8px; flex-wrap: nowrap; width: max-content; }
    .copy-tooltip { position: fixed; background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; pointer-events: none; z-index: 11000; }
    .spec-context-menu { position: absolute; display: none; min-width: 200px; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 6px 0; z-index: 4000; }
    .spec-context-menu.visible { display: block; }
    .spec-context-menu button { width: 100%; padding: 8px 16px; border: none; background: none; font-size: 13px; text-align: left; color: inherit; cursor: pointer; transition: background 0.2s; }
    .spec-context-menu button:hover { background: var(--bg-primary); }

    .modalRow { display:flex; gap:8px; margin-top:8px; }
    .modalColumn { display:flex; flex-direction:column; gap:8px; }
    .registry-checkboxes { display:flex; flex-direction:column; margin-top:8px; }
    .registry-checkboxes .checkbox-item { display:flex; align-items:center; gap:6px; font-size: 11px; color: var(--text-secondary); }
    
    .modalCONTEINERpost { display: flex; border-radius: 6px; background: transparent; border: none; }
    .status-display { width: auto; padding: 8px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 6px; background-color: transparent; color: var(--text-secondary); box-sizing: border-box; text-align: left; transition: opacity 1s; text-transform: uppercase; text-align: center; }
    .status-display.error { border-color: var(--error); color: var(--error); }
    .fade-toggle { transition: opacity 0.5s; }
    .fade-toggle.hidden { opacity: 0; pointer-events: none; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Bottom Window */
    .modal9-window { 
      color: var(--text-primary); 
      position: fixed; 
      top: 100px; /* Adjusted for smaller top window (20 + 60 + 20) */
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: 1520px;
      padding: 10px; 
      box-sizing: border-box; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
    }
    .modal9-content { width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; overflow-x: visible; padding-right: 5px; }
    .modal9-content::-webkit-scrollbar{width:4px;}
    .modal9-content::-webkit-scrollbar-track{background:transparent;}
    .modal9-content::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:10px;}

    /* Simplified Upload Button */
    .upload-btn-main {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0 20px;
      height: 40px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap; /* Prevent text wrap */
    }
    .upload-btn-main:hover { background: var(--accent-hover); }
    .upload-btn-main:disabled { opacity: 0.6; cursor: default; }
    
    .upload-status-wrapper { display:flex; flex-direction:column; align-items:flex-start; color: var(--text-secondary); font-size: 12px; min-width: 150px; }
    
    .darkmatter-btn { background: var(--accent); border:none; color: #fff; padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; transition:background 0.2s; font-weight: 500; }
    .darkmatter-btn:hover { background: var(--accent-hover); }
    .darkmatter-btn:disabled { opacity:0.5; cursor:default; pointer-events:none; }
    .darkmatter-btn .loader { display:none; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
    .darkmatter-btn.loading .loader { display:block; }
    .darkmatter-btn.loading .button-text { visibility:hidden; }
    @keyframes spin { from{transform:rotate(0);} to{transform:rotate(360deg);} }

    .switch { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--border-color); transition: .4s; border-radius: 20px; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #fff; transition: .4s; border-radius: 50%; }
    input:checked + .toggle-slider { background-color: var(--accent); }
    input:checked + .toggle-slider:before { transform: translateX(16px); }

    .block1-wrapper{ height:100%; overflow-y:auto; overflow-x:hidden; }
    .spec-container { margin-bottom:8px; padding-top:8px; }
    
    /* Progress Steps */
    .spec-progress.multistep { display:flex; gap:8px; width:100%; }
    .spec-progress.multistep .step { flex:1; display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
    .spec-progress.multistep .step-body { display:flex; gap:8px; margin-left:0; align-items: center; width: 100%; }
    .spec-progress.multistep .step-body .darkmatter-btn { height:28px; padding:0 10px; width:auto; flex-shrink: 0; }
    .spec-progress.multistep .bar { width:100%; height:2px; background: var(--border-color); border-radius:2px; transition:background 0.3s; }
    .spec-progress.multistep .step.active .bar { background: var(--accent); }
    .spec-progress.multistep .label { font-size:10px; color: var(--text-muted); white-space: nowrap; }
    .spec-progress.multistep .icons .material-symbols-outlined { font-size:14px; color: var(--text-muted); }
    .spec-progress.multistep .step.active .label { color: var(--text-primary); font-weight: 600; }
    .spec-progress.multistep .step.active .icons .material-symbols-outlined { color: var(--success); }
    
    .spec-header { background:transparent; cursor:pointer; font-weight:600; }
    .group-close { float:right; background:none; border:none; cursor:pointer; color: var(--text-muted); transition: color 0.2s; font-size: 18px; line-height: 1; }
    .group-close:hover { color: var(--accent); }

    /* Action Buttons */
    .spec-action-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .spec-action-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 120px; height: 28px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .spec-action-btn:hover { background: var(--bg-primary); border-color: var(--accent); }
    .spec-action-btn--excel { border-color: var(--success); color: var(--success); background: rgba(16, 185, 129, 0.05); }
    .spec-action-btn--excel:hover { background: var(--success); color: #fff; }

        /* === SLIDESHOW STYLES (Dynamic Height) === */
    .slideshow-container {
      position: relative;
      width: 100%;
      min-width: 700px;
      display: grid; /* Используем Grid для схлопывания слоев */
      border-radius: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
    }

    .slide {
      grid-area: 1 / 1; /* Размещаем все слайды в одной ячейке сетки */
      width: 100%;
      height: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      /* display: none убрано, чтобы высота считалась */
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 2;
    }

    .slide-content {
      padding: 15px;
      height: auto;
      overflow: visible; /* Отключаем скроллы */
    }

    .caption {
      padding: 8px 15px;
      font-size: 11px;
      letter-spacing: 0.5px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      text-align: right;
      color: var(--text-secondary);
      font-weight: 500;
      position: relative; /* Чтобы быть поверх контента */
      z-index: 3;
    }

    /* Navigation */
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 20px;
      transform: translateY(0); 
      color: var(--text-muted);
      font-size: 18px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
      opacity: 0.8;
      z-index: 3;
      user-select: none;
      font-weight: bold;
    }
    .prev:hover, .next:hover { opacity: 1; background: var(--accent); color: #fff; border-color: var(--accent); }
    .prev { left: 8px; }
    .next { right: 8px; }

    /* Dots */
    .dots-container {
      position: absolute;
      bottom: 45px; /* Над подписью */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 3;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-color);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.2);
    }

    /* === CLOSE BUTTON ACCENT STYLE === */
    .spec-close-btn-accent {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      height: 34px; /* Высота как у input */
      width: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
      position: absolute;
      right: -10px; /* Сдвиг вправо */
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .spec-close-btn-accent:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div id="home_wave"></div>
  <div id="preloader"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
  <div id="db-disconnect-overlay"><div class="loading-wave"><div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div><div class="loading-bar"></div></div></div>

  <!-- Login -->
  <div id="login-wrapper">
    <div class="container glass3d">
      <div class="overlay" id="overlay">
        <div class="sign-in"><h3 style="color: white;">ТОЛЬКО УЗНАЛИ О НАС?</h3><p style="color: rgba(255,255,255,0.7);">Расскажите немного о себе,<br>и совершенствуйте своё дело вместе с нами!</p><button class="button-submit2" id="slide-right-button">Создать учетную запись</button></div>
        <div class="sign-up" style="text-align:left;"><h3 style="color: white;">МЫ ЗНАКОМЫ?</h3><p style="color: rgba(255,255,255,0.7);">Если вы уже зарегистрированы,<br>перейдите на форму входа</p><button class="button-submit2" id="slide-left-button">Форма входа</button></div>
      </div>
      <div class="form">
        <div class="sign-in" id="sign-in-info" style="margin-left: -255px;"><h2 style="color: var(--text-primary)">AI Equipment Selection</h2><form id="registration-form"><div class="modalFORM"><h3>ФОРМА РЕГИСТРАЦИИ</h3><div class="inputForm"><input class="inputField" placeholder="Фамилия" type="text" name="lastname"/></div><div class="inputForm"><input class="inputField" placeholder="Имя" type="text" name="firstname"/></div><div class="inputForm"><input class="inputField" placeholder="Отчество" type="text" name="middlename"/></div><div class="inputForm"><input class="inputField" placeholder="+7 (999) 999 99 99" type="text" name="phone"/></div><div class="inputForm"><input class="inputField" placeholder="mail@gmail.com" type="email" name="email"/></div><div class="inputForm"><input class="inputField" placeholder="пароль" type="password" name="password"/></div><button class="button-submit" id="regBtn">Отправить заявку</button></div></form></div>
        <div class="sign-up show" id="sign-up-info" style="margin-left: 130px;"><h2 style="color: var(--text-primary)">AI Equipment Selection</h2><form id="login-form" method="post" autocomplete="on"><div class="modalFORM"><h3>ФОРМА ВХОДА</h3><div class="inputForm"><input class="inputField" type="email" placeholder="email: user@gmail.com" id="loginEmail" name="email" autocomplete="username"/></div><div class="inputForm"><input class="inputField" type="password" placeholder="ваш пароль" id="loginPassword" name="password" autocomplete="current-password"/></div><button class="button-submit" id="loginBtn">Войти</button></div></form></div>
      </div>
    </div>
  </div>

  <!-- Modal 9 App -->
  <div id="modal9-container" class="spec-modal">
    <div class="spec-context-menu" aria-hidden="true"><button type="button" data-action="copy">Скопировать спецификацию</button><button type="button" data-action="excel">Скачать спецификацию Excel</button></div>
    
    <!-- Top Window: Single Row -->
    <div class="modal9-top-window glass3d">
     <div class="modal9-top-body">
        <!-- Upload Button -->
        <button type="button" class="upload-btn-main">
           <span class="button-text">загрузить техническое задание</span>
           <span class="loader"></span>
        </button>
        <input type="file" class="js-file__input" style="display:none" />
        
        <!-- Status Wrapper (Flex item) -->
        <div class="upload-status-wrapper">
           <progress class="upload-progress spec-upload-progress" value="0" max="100" style="width:100%;display:none;"></progress>
           <div class="upload-status"></div>
        </div>

        <!-- Spacer -->
        <div style="flex-grow: 1;"></div>

      async function loadHistory(options = {}) {

          try { const { data: { session } = {} } = await supabase.auth.getSession(); const sessionEmail = session?.user?.email || null; if (sessionEmail && !currentUserEmail) currentUserEmail = sessionEmail; if (myFilesToggle.checked && sessionEmail) query = query.eq('user_login', sessionEmail); } catch (err) {}
          const searchValue = filterInput.value.trim();

      function updateSpecProgress(specId, info) { const idStr = String(specId); let statuses = info; if (!statuses || (typeof statuses === 'object' && !('parser' in statuses) && !('selector' in statuses) && !('pricer' in statuses))) { const row = historyList.querySelector(`.history-item[data-spec-id="${idStr}"]`); const parser = row?.querySelector('[data-field="status_parser"]')?.value || row?.querySelector('[data-field="status_parser"]')?.textContent || ''; const selector = row?.querySelector('[data-field="status_selector"]')?.value || row?.querySelector('[data-field="status_selector"]')?.textContent || ''; const pricer = row?.querySelector('[data-field="status_pricer"]')?.value || row?.querySelector('[data-field="status_pricer"]')?.textContent || ''; statuses = { parser, selector, pricer }; } root.querySelectorAll(`.spec-progress[data-spec-id="${idStr}"]`).forEach(el => setProgress(el, statuses)); }
      
      function setProgress(progressEl, info) { 
        if (!progressEl) return; 
        const specId = progressEl.dataset.specId; 
        const row = historyList.querySelector(`.history-item[data-spec-id="${specId}"]`); 
        let parserStatus = row?.querySelector('[data-field="status_parser"]')?.value || ''; 
        let selectorStatus = row?.querySelector('[data-field="status_selector"]')?.value || row?.querySelector('[data-field="status_selector"]')?.textContent || ''; 
        // pricerStatus удален, так как шаг 3 убран
        if (typeof info === 'object' && info && ('parser' in info || 'selector' in info)) { 
          parserStatus = info.parser ?? parserStatus; 
          selectorStatus = info.selector ?? selectorStatus; 
        } 
        const steps = progressEl.querySelectorAll('.step'); 
        const pDone = interpretDone(parserStatus); 
        const sDone = interpretDone(selectorStatus); 
        const apply = (stepEl, done) => { 
          const icon = stepEl.querySelector('.status'); 
          if (done) { 
            stepEl.classList.add('active'); 
            if (icon) icon.textContent = 'done_all'; 
          } else { 
            stepEl.classList.remove('active'); 
            if (icon) icon.textContent = 'indeterminate_check_box'; 
          } 
        }; 
        apply(steps[0], pDone); 
        apply(steps[1], sDone); 
      }
      function interpretDone(str) { const s = String(str || '').toLowerCase(); const c = parseSelectorCounts(s); return c ? (c.total > 0 && c.received >= c.total) : /(готов|done)/i.test(s); }
      function parseSelectorCounts(str) { const m = String(str || '').match(/(\d+)\s*\/\s*(\d+)\s*\/\s*(\d+)/); return m ? { sent: Number(m[1]), received: Number(m[2]), total: Number(m[3]) } : null; }
      
      function initProgressHandlers(progress, specId) { const buttons = progress.querySelectorAll('.refresh'); if (buttons[0]) buttons[0].addEventListener('click', async e => { e.stopPropagation(); const btn = e.currentTarget; btn.classList.add('loading'); btn.disabled = true; try { await refreshParser(specId, progress); } finally { btn.classList.remove('loading'); btn.disabled = false; } }); if (buttons[1]) buttons[1].addEventListener('click', async e => { e.stopPropagation(); const btn = e.currentTarget; btn.classList.add('loading'); btn.disabled = true; try { await refreshSelector(specId, progress); } finally { btn.classList.remove('loading'); btn.disabled = false; } }); }
      async function refreshParser(specId, progress) { try { await supabase.from(SELECT_TABLE).delete().eq('spec_id', specId); await supabase.from(POS_TABLE).delete().eq('spec_id', specId); await supabase.from(TABLE).update({ status: 'BLOCK 1 ( в работе )' }).eq('id', specId); await supabase.functions.invoke('modal9-parser', { body: { request_id: specId } }); await loadHistory(); } catch (err) { console.error('refreshParser error:', err); } }
      async function refreshSelector(specId, progress) { try { await supabase.from(TABLE).update({ status: 'подготовка' }).eq('id', specId); const { error } = await supabase.functions.invoke('modal9-selector', { body: { spec_id: specId } }); if (error) throw error; await loadHistory(); } catch (err) { console.error('refreshSelector error:', err); } }

      function openGroup(id, saved) { }
      function closeGroup(id) { }
      
      function openRowGroup(id, blockClass) {
        if (openedSpecId && openedSpecId !== id) closeRowGroup(openedSpecId);
        openedSpecId = id;
        const cont = historyList.querySelector(`.spec-content[data-spec-id="${id}"]`);
        const prog = historyList.querySelector(`.spec-progress[data-spec-id="${id}"]`);
        const actions = historyList.querySelector(`.spec-container[data-spec-id="${id}"] .spec-action-row`);
        if (cont) { const oldT = hideTimers.get(cont); if (oldT) { clearTimeout(oldT); hideTimers.delete(cont); } cont.style.display = 'block'; requestAnimationFrame(() => cont.classList.remove('hidden')); }
        if (actions) { const oldT = hideTimers.get(actions); if (oldT) { clearTimeout(oldT); hideTimers.delete(actions); } actions.style.display = 'flex'; requestAnimationFrame(() => actions.classList.remove('hidden')); }
        if (prog) { const oldT = hideTimers.get(prog); if (oldT) { clearTimeout(oldT); hideTimers.delete(prog); } prog.style.display = 'flex'; requestAnimationFrame(() => prog.classList.remove('hidden')); }
        historyList.querySelectorAll('.spec-progress').forEach(p => { if (p.dataset.specId !== String(id)) { p.classList.add('hidden'); const t = setTimeout(() => { p.style.display = 'none'; hideTimers.delete(p); }, 500); hideTimers.set(p, t); } });
        historyList.querySelectorAll('.spec-action-row').forEach(row => { const specId = row.closest('.spec-container')?.dataset.specId; if (specId !== String(id)) { row.classList.add('hidden'); const t = setTimeout(() => { row.style.display = 'none'; hideTimers.delete(row); }, 500); hideTimers.set(row, t); } });
        const row = historyList.querySelector(`.history-item[data-spec-id="${id}"]`);
        if (row) {
          const specCont = row.querySelector('[data-field="id"]').closest('.input-container');
                    if (specCont) { 
            specCont.style.position = 'relative'; 
            if (!specCont.querySelector('.spec-close-btn-accent')) { 
              const extraBtn = document.createElement('button'); 
              extraBtn.textContent = '×'; 
              extraBtn.className = 'spec-close-btn-accent'; // Применяем новый класс стилей
              extraBtn.addEventListener('click', e => { e.stopPropagation(); closeRowGroup(id); }); 
              specCont.appendChild(extraBtn);

        }
      }
      
      function closeRowGroup(id) {
        if (openedSpecId === id) openedSpecId = null;
        const cont = historyList.querySelector(`.spec-content[data-spec-id="${id}"]`);
        const extra = historyList.querySelector(`.history-item[data-spec-id="${id}"] .spec-close-btn-accent`);
        const prog = historyList.querySelector(`.spec-progress[data-spec-id="${id}"]`);
        const actions = historyList.querySelector(`.spec-container[data-spec-id="${id}"] .spec-action-row`);
        if (cont) { cont.classList.add('hidden'); const t = setTimeout(() => { cont.style.display = 'none'; hideTimers.delete(cont); }, 500); hideTimers.set(cont, t); }
        if (prog) { prog.classList.add('hidden'); const t = setTimeout(() => { prog.style.display = 'none'; hideTimers.delete(prog); }, 500); hideTimers.set(prog, t); }
        if (actions) { actions.classList.add('hidden'); const t = setTimeout(() => { actions.style.display = 'none'; hideTimers.delete(actions); }, 500); hideTimers.set(actions, t); }
        if (extra) extra.remove();
      }

      // Slideshow Logic
      function setupSlideshows(scope) {
        scope.querySelectorAll('.slideshow-container').forEach(container => {
          const slides = container.querySelectorAll(".slide");
          const dots = container.querySelectorAll(".dot");
          let index = 0;

          const showSlide = (n) => {
            slides[index].classList.remove("active");
            dots[index].classList.remove("active");
            index = (n + slides.length) % slides.length;
            slides[index].classList.add("active");
            dots[index].classList.add("active");
          };

          const prevBtn = container.querySelector(".prev");
          const nextBtn = container.querySelector(".next");
          if (prevBtn) prevBtn.addEventListener("click", () => showSlide(index - 1));
          if (nextBtn) nextBtn.addEventListener("click", () => showSlide(index + 1));

          dots.forEach((dot) => {
            dot.addEventListener("click", () => showSlide(parseInt(dot.dataset.index)));
          });
        });
      }

      function setupOverflowTooltips(scope) { scope.querySelectorAll('.styled_input_bar').forEach(input => { const updateOverflow = () => { const container = input.closest('.input-container'); if (!container) return; if (input.scrollWidth > input.clientWidth) container.classList.add('overflow'); else container.classList.remove('overflow'); }; updateOverflow(); input.addEventListener('input', updateOverflow); input.addEventListener('mouseenter', () => { if (input.scrollWidth > input.clientWidth) input.setAttribute('title', input.value || input.textContent || ''); }); input.addEventListener('mouseleave', () => input.removeAttribute('title')); }); }
      
      function hideContextMenu() { if (!contextMenu) return; contextMenu.classList.remove('visible'); contextMenu.style.display = 'none'; contextSpecContent = null; }
      function showContextMenuAt(event, specContent) { if (!contextMenu || !specContent) return; const specId = specContent.dataset.specId; if (!specId) return; contextSpecContent = specContent; contextMenu.dataset.specId = specId; contextMenu.classList.remove('visible'); contextMenu.style.display = 'block'; contextMenu.style.left = '0px'; contextMenu.style.top = '0px'; requestAnimationFrame(() => { const rootRect = root.getBoundingClientRect(); const rect = contextMenu.getBoundingClientRect(); let left = event.clientX - rootRect.left; let top = event.clientY - rootRect.top; const maxLeft = Math.max(0, rootRect.width - rect.width); const maxTop = Math.max(0, rootRect.height - rect.height); if (left < 0) left = 0; else if (left > maxLeft) left = maxLeft; if (top < 0) top = 0; else if (top > maxTop) top = maxTop; contextMenu.style.left = `${left}px`; contextMenu.style.top = `${top}px`; contextMenu.classList.add('visible'); }); }
      
      root.addEventListener('contextmenu', event => { if (!contextMenu) return; const specContent = event.target.closest('.spec-content'); if (!specContent || specContent.classList.contains('hidden')) { hideContextMenu(); return; } if (!specContent.closest('.history-list') && !specContent.closest('.block1-wrapper')) { hideContextMenu(); return; } event.preventDefault(); showContextMenuAt(event, specContent); });
      window.addEventListener('click', event => { if (!contextMenu) return; if (contextMenu.style.display === 'block' && !contextMenu.contains(event.target)) hideContextMenu(); });
      window.addEventListener('resize', hideContextMenu); root.addEventListener('scroll', hideContextMenu, true); window.addEventListener('keydown', event => { if (event.key === 'Escape') hideContextMenu(); });
      if (contextMenu) { contextMenu.addEventListener('click', async event => { const button = event.target.closest('button[data-action]'); if (!button) return; event.preventDefault(); event.stopPropagation(); const action = button.dataset.action; const specId = contextMenu.dataset.specId; if (!specId) return; const specData = collectSpecData(specId, contextSpecContent); if (!specData) { hideContextMenu(); return; } try { if (action === 'copy') { const text = formatSpecForClipboard(specData); if (text) { await navigator.clipboard.writeText(text); showCopyTip(button); } } else if (action === 'excel') { const blob = createExcelBlob(specData); if (blob) downloadSpecExcel(specData, blob); } } catch (err) { console.error('context menu action error:', err); } finally { hideContextMenu(); } }); contextMenu.addEventListener('contextmenu', event => event.preventDefault()); contextMenu.addEventListener('mousedown', event => event.stopPropagation()); }

      function collectSpecData(specId, specContent) { if (!specId) return null; const idStr = String(specId); const container = specContent || historyList.querySelector(`.spec-content[data-spec-id="${idStr}"]`) || block1List.querySelector(`.spec-content[data-spec-id="${idStr}"]`); if (!container) return null; const historyItem = historyList.querySelector(`.history-item[data-spec-id="${idStr}"]`); const historyEntry = history.find(h => String(h.id) === idStr); const readField = (field) => { if (historyItem) { const el = historyItem.querySelector(`[data-field="${field}"]`); if (el) { const raw = el.tagName === 'INPUT' ? el.value : el.textContent; if (typeof raw === 'string') return raw.trim(); } } if (historyEntry) { if (field === 'created_at') return historyEntry.created_at ? new Date(historyEntry.created_at).toLocaleString() : ''; const value = historyEntry[field]; if (value != null) return String(value).trim(); } return ''; }; const data = { id: idStr, header: { file_number: readField('file_number'), user_login: readField('user_login'), created_at: readField('created_at'), file_name: readField('file_name'), file_ext: readField('file_ext'), status: readField('status'), spec_id: idStr }, positions: [] }; container.querySelectorAll('.modalCONTEINERpost').forEach(node => { const pos = { posNumber: node.querySelector('[data-field="pos_number"]')?.value?.trim() || '', name: node.querySelector('[data-field="name"]')?.value?.trim() || '', block1: [], block2: [] }; const block1Content = node.querySelector('.slide[data-slide="1"] .slide-content'); if (block1Content) block1Content.querySelectorAll('.modalRow').forEach(row => { const param = (row.querySelector('.param-input')?.value || '').trim(); const value = (row.querySelector('.value-input')?.value || '').trim(); if (param || value) pos.block1.push({ param, value }); }); const block2Content = node.querySelector('.slide[data-slide="2"] .slide-content'); if (block2Content) block2Content.querySelectorAll('.modalRow').forEach(row => { const inputs = row.querySelectorAll('input'); if (!inputs.length) return; pos.block2.push(Array.from(inputs, input => (input.value || '').trim())); }); data.positions.push(pos); }); return data; }
      async function runSpecAction(action, specId, specContent, button) { const specData = collectSpecData(specId, specContent); if (!specData) return; try { if (action === 'copy') { const text = formatSpecForClipboard(specData); if (text) { await navigator.clipboard.writeText(text); if (button) showCopyTip(button); } } else if (action === 'excel') { const blob = createExcelBlob(specData); if (blob) downloadSpecExcel(specData, blob); } } catch (err) { console.error('spec action error:', err); } }
      function formatSpecForClipboard(data) { if (!data) return ''; const lines = []; lines.push(`Spec #${data.id}`); lines.push(`File: ${data.header.file_name}`); lines.push(''); data.positions.forEach(pos => { lines.push(`${pos.posNumber}. ${pos.name}`); pos.block1.forEach(attr => lines.push(`\t${attr.param}: ${attr.value}`)); pos.block2.forEach(row => lines.push(`\t${row.join('\t')}`)); }); return lines.join('\n'); }
      function createExcelBlob(data) { const html = `<table><tr><th>Spec</th><th>${data.id}</th></tr>${data.positions.map(p => `<tr><td>${p.posNumber}</td><td>${p.name}</td></tr>`).join('')}</table>`; return new Blob(['\uFEFF', html], { type: 'application/vnd.ms-excel' }); }
      function downloadSpecExcel(data, blob) { if (!blob) return; const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; link.download = `spec_${data.id}.xls`; document.body.appendChild(link); link.click(); setTimeout(() => { URL.revokeObjectURL(url); link.remove(); }, 0); }

      function setupRealtime() { if (!supabase) return; realtimeSub = supabase.channel('modal9-realtime').on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, payload => { if (!payload) return; const { eventType, new: newRow, old } = payload; const specId = newRow?.id ?? old?.id; if (eventType === 'UPDATE' && newRow && specId != null && watchedSpecIds.has(String(specId))) applyRealtimeRegistryUpdate(newRow); else if (eventType === 'INSERT' || eventType === 'DELETE') loadHistory(); }).on('postgres_changes', { event: '*', schema: 'public', table: POS_TABLE }, payload => { const specId = payload.new?.spec_id ?? payload.old?.spec_id; if (specId == null || !watchedSpecIds.has(String(specId))) return; scheduleReloadSpec(specId); }).on('postgres_changes', { event: '*', schema: 'public', table: SELECT_TABLE }, payload => { const specId = payload.new?.spec_id ?? payload.old?.spec_id; if (specId == null || !watchedSpecIds.has(String(specId))) return; scheduleReloadSpec(specId); }).subscribe(); }
      function scheduleReloadSpec(specId) { if (specId === null || specId === undefined) return; const key = String(specId); if (reloadTimers.has(key)) return; const timer = setTimeout(async () => { reloadTimers.delete(key); try { await reloadSingleSpec(specId); } catch (err) { console.error('[modal9] reloadSingleSpec error:', err); } }, 400); reloadTimers.set(key, timer); }
      async function reloadSingleSpec(specId) { const idStr = String(specId); const { data, error } = await supabase.from(POS_TABLE).select('file_number, user_login, file_name, id, spec_id, pos_number, pos_number_int, name, qty, unit, attrs, attrs_json').eq('spec_id', specId).order('pos_number_int', { ascending: true }); if (error) { console.error('[modal9] reloadSingleSpec POS_TABLE error:', error); return; } const newRows = (data || []).map(r => ({ file_number: r.file_number, user_login: r.user_login, file_name: r.file_name, id: r.id, spec_id: r.spec_id, pos_number: r.pos_number, pos_number_int: toPosNum(r.pos_number_int ?? r.pos_number), name: r.name, qty: r.qty, unit: r.unit, attrs: r.attrs, attrs_json: r.attrs_json })); block1Rows = block1Rows.filter(row => String(row.spec_id) !== idStr).concat(newRows); const posIds = newRows.map(r => r.id); if (posIds.length) { const { data: sels, error: selErr } = await supabase.from(SELECT_TABLE).select('pos_id, article, model_name, qty, unit, price, sum, price1_amount, price1_currency, price1_store, price1_url, price2_amount, price2_currency, price2_store, price2_url, price3_amount, price3_currency, price3_store, price3_url, prices_json, pricer_status').in('pos_id', posIds); if (selErr) console.error('[modal9] reloadSingleSpec SELECT_TABLE error:', selErr); else if (Array.isArray(sels)) sels.forEach(s => { const key = s.pos_id; if (key === null || key === undefined) return; const list = selectionMap[key] || []; list.push(s); selectionMap[key] = list; }); } specGroups[idStr] = newRows; specRenderCache.set(idStr, JSON.stringify(newRows.map(r => r.id))); const changedIds = new Set([idStr]); updateBlock1SpecContainers({ changedIds }); updateHistorySpecContainers({ changedIds }); }
      function applyRealtimeRegistryUpdate(newRow) { if (!newRow || !newRow.id) return; const specId = String(newRow.id); if (!watchedSpecIds.has(specId)) return; const idx = history.findIndex(h => String(h.id) === specId); if (idx === -1) return; const prev = history[idx]; history[idx] = { ...prev, ...newRow }; lastHistoryStatus[newRow.id] = { status_parser: newRow.status_parser, status_selector: newRow.status_selector, status_pricer: newRow.status_pricer }; const rowEl = historyList.querySelector(`.history-item[data-spec-id="${specId}"]`); if (!rowEl) return; const updateField = (fieldName, dbValue, { animate = false, isTokens = false } = {}) => { let selector = `[data-field="${fieldName}"]`; if (isTokens) selector = '[data-field="-"]'; const el = rowEl.querySelector(selector); if (!el) return; let displayValue = isTokens ? formatTokenCost(dbValue) : dbValue ?? ''; const prevValue = 'value' in el ? el.value : el.textContent; if (prevValue === displayValue) return; if (STATUS_FIELDS.has(fieldName) || animate) animateStatus(el, displayValue); else { if ('value' in el) el.value = displayValue; else el.textContent = displayValue; } }; updateField('status_parser', newRow.status_parser, { animate: true }); updateField('status_selector', newRow.status_selector, { animate: true }); updateField('status_pricer', newRow.status_pricer, { animate: true }); updateField('tokens', newRow.tokens, { isTokens: true }); updateSpecProgress(specId); }
      
      function cleanupRealtime() { if (realtimeSub) { realtimeSub.unsubscribe(); realtimeSub = null; } if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; } }
      window.cleanupRealtime = cleanupRealtime;
      
      // Initial load
      if (supabase?.auth?.getUser) { try { supabase.auth.getUser().then(({ data: { user } = {}, error }) => { if (error) return; currentUserEmail = user?.email || null; }); } catch (err) {} }
      await loadHistory({ resetLimit: true });
      setupRealtime();
    }

    window.logout = function() { location.reload(); };
