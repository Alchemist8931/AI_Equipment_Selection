<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Relative Parallel — Redesigned</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    :root {
      --form-width: 900px;
      --form-height: 900px;
      --overlay-width: 385px;
      --content-width: 1300px; /* Фиксированная ширина контента */
      
      --loader-line-color: #000000;
      --loader-line-width: 10px;
      --loader-line-height: 70px;
      
      --fon: #ffffff;
      --black: #000000;
      --gray-light: #f5f5f5;
      --gray-medium: #e0e0e0;
      --content-color: #000000;
      
      --accent: #000000; /* Черно-белая тема */
      --radius: 12px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: var(--fon);
      color: var(--content-color);
      overflow: hidden;
    }

    /* --- Прелоадер --- */
    #preloader {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; gap: 10px;
      z-index: 9999;
      opacity: 0; visibility: hidden;
      transition: opacity 0.5s;
    }
    #preloader.visible { opacity: 1; visibility: visible; }
    #preloader .line {
      width: var(--loader-line-width);
      height: var(--loader-line-height);
      background: var(--content-color);
      animation: bounce 1.5s infinite ease-in-out;
      border-radius: 4px;
    }
    #preloader .line:nth-child(2) { animation-delay: 0.3s; }
    #preloader .line:nth-child(3) { animation-delay: 0.6s; }
    #preloader .line:nth-child(5) { animation-delay: 1.2s; }

    @keyframes bounce {
      0%,20%,50%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-30px); }
      60% { transform: translateY(-15px); }
    }

    /* --- Меню --- */
    #side-menu { display: none; }
    .navigation {
      position: fixed;
      top: 20px; left: 20px;
      height: calc(100vh - 40px);
      width: 70px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid #e0e0e0;
      border-radius: var(--radius);
      z-index: 1200;
      box-shadow: var(--shadow);
    }
    .navigation ul {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px 0;
    }
    .navigation ul li {
      list-style: none;
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
    }
    .navigation ul li:hover { background: var(--gray-light); }
    .navigation ul li.active { background: var(--black); }
    .navigation ul li.active .material-symbols-outlined { color: var(--fon); }
    
    /* Подсказки */
    .navbar__item a .title {
      position: absolute;
      left: 70px;
      background: var(--black);
      color: var(--fon);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .navigation ul li:hover a .title { opacity: 1; }

    /* --- Логин/Регистрация --- */
    #login-wrapper {
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #login-wrapper.show { opacity: 1; }
    
    .container {
      width: var(--form-width);
      height: var(--form-height);
      position: relative;
      background: var(--fon);
      border: 1px solid #e0e0e0;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: var(--overlay-width);
      height: 100%;
      background: var(--black);
      color: var(--fon);
      z-index: 2;
      transition: left 0.8s cubic-bezier(0.86, 0, 0.07, 1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }
    .overlay.open-sign-up {
      left: calc(var(--form-width) - var(--overlay-width));
    }

    .form {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .form .sign-in, .form .sign-up {
      width: 50%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.3s;
    }
    .form .sign-up { display: none; opacity: 0; }
    .form .sign-up.show { display: flex; opacity: 1; }

    .modalFORM {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 380px;
    }
    .modalFORM h3 {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    /* Modern Inputs */
    .inputField {
      width: 100%;
      padding: 15px;
      border: 1px solid var(--gray-medium);
      border-radius: 4px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
      background: transparent;
    }
    .inputField:focus {
      outline: none;
      border-color: var(--black);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
    }

    .button-submit {
      width: 100%;
      padding: 15px;
      background: var(--black);
      color: var(--fon);
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .button-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .button-submit2 {
      background: transparent;
      border: 1px solid var(--fon);
      color: var(--fon);
      padding: 12px 20px;
      width: 100%;
      border-radius: 4px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }
    .button-submit2:hover {
      background: rgba(255,255,255,0.1);
    }

    /* --- Модальное окно контента --- */
    .modal-window {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: var(--content-width); /* 1300px */
      height: calc(100vh - 40px);
      background: var(--fon);
      border: 1px solid #e0e0e0;
      border-radius: var(--radius);
      z-index: 1100;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    .content-area {
      width: 100%;
      height: 100%;
      padding: 40px;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .content-area.visible { opacity: 1; }

    /* --- Стили Нового Интерфейса Спецификации --- */
    
    /* Заголовок списка */
    .spec-header-row {
      display: flex;
      padding: 0 20px 20px 0;
      border-bottom: 2px solid var(--black);
      margin-bottom: 20px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }
    
    /* Контейнер строки */
    .spec-row-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--gray-medium);
      gap: 30px;
    }

    /* Левая часть: Номер, Имя, Кол-во */
    .spec-left-block {
      width: 400px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .spec-id-name-qty {
      display: flex;
      gap: 15px;
      align-items: flex-end;
    }
    .spec-pos-num {
      font-size: 48px;
      font-weight: 800;
      color: var(--black);
      line-height: 1;
      min-width: 60px;
    }
    .spec-main-info {
      flex: 1;
    }
    .spec-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .spec-qty {
      font-size: 14px;
      color: #666;
    }

    /* Средняя часть: Параметры */
    .spec-params-block {
      width: 350px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      border-left: 1px solid var(--gray-medium);
      padding-left: 30px;
    }
    .param-row {
      display: flex;
      gap: 10px;
    }
    .param-key {
      color: #888;
      min-width: 100px;
    }
    .param-val {
      font-weight: 600;
      color: var(--black);
    }

    /* Правая часть: Слайдер (Блоки) */
    .spec-right-block {
      flex: 1;
      min-width: 400px;
    }
    
    /* --- Слайдер (Интеграция из примера) --- */
    .slideshow-container {
      position: relative;
      width: 100%;
      height: 250px; /* Фиксированная высота для строки */
      overflow: hidden;
      border-radius: 8px;
      background: #f0f0f0;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.1);
      filter: grayscale(100%) contrast(1.1) brightness(0.9);
      transition: transform 7s ease;
    }
    .slide.active img { transform: scale(1); }
    
    .overlay-slide {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      z-index: 1;
    }
    .caption {
      position: absolute;
      bottom: 20px; left: 20px;
      color: #fff;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      transition: all 1s ease 0.5s;
      z-index: 2;
    }
    .slide.active .caption {
      opacity: 1;
      transform: translateY(0);
    }
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 20px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      z-index: 3;
      user-select: none;
      transition: 0.3s;
    }
    .prev { left: 10px; }
    .next { right: 10px; }
    .prev:hover, .next:hover { background: rgba(0,0,0,0.7); }
    
    .dots-container {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: 0.3s;
    }
    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* --- Утилиты --- */
    .input-container { position: relative; width: 100%; margin-bottom: 15px; }
    .lines-loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); gap: 10px; }
    .lines-loader.visible { display: flex; }
    #db-disconnect-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
    #home_wave { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

    /* Кнопки действий */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--black);
      color: var(--black);
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
    }
    .action-btn:hover { background: var(--black); color: var(--fon); }
    .actions-row { margin-bottom: 40px; display: flex; gap: 15px; }

  </style>
</head>
<body>

  <div id="home_wave"></div>

  <div id="preloader">
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
  </div>

  <div id="db-disconnect-overlay">
    <p style="font-weight: 600; text-transform: uppercase;">Потеря соединения...</p>
  </div>

  <!-- Меню -->
  <div id="side-menu">
    <div class="navigation">
      <ul>
        <li class="navbar__item active" data-levels="PAGE1" data-modal="modal1">
          <a href="#"><span class="material-symbols-outlined">view_kanban</span><span class="title">Tasks</span></a>
        </li>
        <li class="navbar__item" data-levels="PAGE9" data-modal="modal9">
          <a href="#"><span class="material-symbols-outlined">blur_on</span><span class="title">Specifications</span></a>
        </li>
        <li class="navbar__item" data-levels="PAGE10" data-modal="modal10">
          <a href="#"><span class="material-symbols-outlined">forum</span><span class="title">Support</span></a>
        </li>
        <!-- Остальные пункты меню скрыты для краткости, но работают по тому же принципу -->
        <div class="indicator" style="display:none;"></div>
      </ul>
    </div>
  </div>

  <!-- Правое модальное окно -->
  <div id="right-modal" class="modal-window">
    <div class="lines-loader" id="linesLoader">
      <div class="line"></div><div class="line"></div><div class="line"></div>
    </div>
    <div class="content-area" id="modalContentArea"></div>
  </div>

  <!-- Логин -->
  <div id="login-wrapper">
    <div class="container">
      <div class="overlay" id="overlay">
        <div class="sign-in">
          <h3>Добро пожаловать</h3>
          <p style="font-size: 13px; opacity: 0.8; margin-bottom: 20px;">Нет аккаунта? Зарегистрируйтесь.</p>
          <button class="button-submit2" id="slide-right-button">Создать аккаунт</button>
        </div>
        <div class="sign-up" style="display:none;">
          <h3>С возвращением</h3>
          <p style="font-size: 13px; opacity: 0.8; margin-bottom: 20px;">Уже зарегистрированы? Войдите.</p>
          <button class="button-submit2" id="slide-left-button">Войти</button>
        </div>
      </div>
      
      <div class="form">
        <!-- Регистрация -->
        <div class="sign-in" id="sign-in-info" style="display:none; opacity:0;">
          <form id="registration-form" class="modalFORM">
            <h3>Регистрация</h3>
            <input class="inputField" placeholder="Фамилия" name="lastname"/>
            <input class="inputField" placeholder="Имя" name="firstname"/>
            <input class="inputField" placeholder="Email" name="email"/>
            <input class="inputField" placeholder="Пароль" type="password" name="password"/>
            <button type="button" class="button-submit" id="regBtn">Зарегистрироваться</button>
          </form>
        </div>
        <!-- Вход -->
        <div class="sign-up show" id="sign-up-info">
          <form id="login-form" class="modalFORM">
            <h3>Вход</h3>
            <input class="inputField" id="loginEmail" placeholder="Email" autocomplete="username"/>
            <input class="inputField" id="loginPassword" type="password" placeholder="Пароль" autocomplete="current-password"/>
            <button type="button" class="button-submit" id="loginBtn">Войти</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Шаблон Modal 9 (Встроен в файл) -->
  <script type="text/template" id="tpl-modal9">
    <div id="modal9-dynamic-root">
      <div class="actions-row">
        <button class="action-btn" id="btn-load-spec">
          <span class="material-symbols-outlined" style="font-size:16px;">refresh</span>
          Загрузить спецификации
        </button>
        <button class="action-btn" id="btn-add-dummy">
          <span class="material-symbols-outlined" style="font-size:16px;">add</span>
          Добавить демо-строку
        </button>
      </div>

      <div class="spec-header-row">
        <div style="width: 400px;">Позиция</div>
        <div style="width: 350px; padding-left: 30px;">Параметры</div>
        <div style="flex: 1;">Визуализация / Блоки</div>
      </div>

      <div id="specs-container"></div>
    </div>
  </script>

  <!-- Основной скрипт -->
  <script type="module">
    import { createClient } from "https://jviswahajwmwibedxcll.supabase.co/functions/v1/vendor/supabase-client.js/index.js"; // Упрощенный импорт для примера, используйте свой путь
    
    // ВАЖНО: Если среда выполнения не поддерживает ES модули по ссылке, используйте ваш локальный путь.
    // Для корректной работы в едином файле предположим, что supabase клиент доступен глобально или через импорт.
    // В данном коде я использую заглушку для Supabase, чтобы код работал без реального бэкенда для демонстрации UI.
    
    // === Эмуляция Supabase для демонстрации UI (замените на ваш реальный код инициализации) ===
    // window.supabase = createClient('URL', 'KEY'); 
    
    const mockData = [
      { id: 1, name: 'Сервер HP ProLiant DL380', qty: 5, unit: 'шт.', params: [
          {k:'CPU', v:'Intel Xeon Gold'}, {k:'RAM', v:'64GB DDR4'}, {k:'Storage', v:'4x 1.2TB SAS'}
        ] 
      },
      { id: 2, name: 'Монитор Dell UltraSharp 27"', qty: 10, unit: 'шт.', params: [
          {k:'Resolution', v:'4K UHD'}, {k:'Panel', v:'IPS'}, {k:'Brightness', v:'350 cd/m²'}
        ]
      }
    ];

    // === Логика Приложения ===
    
    const preloader = document.getElementById('preloader');
    const loginWrapper = document.getElementById('login-wrapper');
    const sideMenu = document.getElementById('side-menu');
    const rightModal = document.getElementById('right-modal');
    const modalContentArea = document.getElementById('modalContentArea');

    // 1. Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      preloader.classList.add('visible');
      setTimeout(() => {
        preloader.classList.remove('visible');
        loginWrapper.classList.add('show');
      }, 1500);
    });

    // 2. Анимация входа
    const overlay = document.getElementById('overlay');
    const signInForm = document.getElementById('sign-in-info');
    const signUpForm = document.getElementById('sign-up-info');

    document.getElementById('slide-right-button').addEventListener('click', () => {
      overlay.classList.add('open-sign-up');
      overlay.querySelector('.sign-in').style.display = 'none';
      overlay.querySelector('.sign-up').style.display = 'flex';
      
      signUpForm.classList.remove('show');
      signUpForm.style.display = 'none';
      signInForm.style.display = 'flex';
      setTimeout(() => signInForm.style.opacity = 1, 50);
    });

    document.getElementById('slide-left-button').addEventListener('click', () => {
      overlay.classList.remove('open-sign-up');
      overlay.querySelector('.sign-in').style.display = 'flex';
      overlay.querySelector('.sign-up').style.display = 'none';
      
      signInForm.style.opacity = 0;
      setTimeout(() => signInForm.style.display = 'none', 300);
      signUpForm.style.display = 'flex';
      setTimeout(() => signUpForm.classList.add('show'), 50);
    });

    // 3. Вход (Mock)
    document.getElementById('loginBtn').addEventListener('click', async () => {
      // Здесь должен быть ваш код авторизации Supabase
      // Для демонстрации пропускаем проверку
      loginWrapper.classList.remove('show');
      sideMenu.style.display = 'block';
      initNavigation();
    });

    document.getElementById('regBtn').addEventListener('click', () => {
      alert('Форма регистрации отправлена (Mock)');
    });

    // 4. Навигация и загрузка страниц
    function initNavigation() {
      const items = document.querySelectorAll('.navbar__item');
      items.forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          const modalId = item.getAttribute('data-modal');
          showModal(modalId);
        });
      });
    }

    async function showModal(pageId) {
      rightModal.style.display = 'flex';
      modalContentArea.classList.remove('visible');
      document.getElementById('linesLoader').classList.add('visible');
      modalContentArea.innerHTML = '';

      // Имитация загрузки
      await new Promise(r => setTimeout(r, 500));

      if (pageId === 'modal9') {
        const tpl = document.getElementById('tpl-modal9');
        if (tpl) {
          modalContentArea.innerHTML = tpl.innerHTML;
          initModal9Logic();
        } else {
          modalContentArea.innerHTML = '<p>Шаблон не найден</p>';
        }
      } else {
        modalContentArea.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; flex-direction:column;">
            <h2 style="font-weight:300; text-transform:uppercase; letter-spacing:5px;">Страница ${pageId}</h2>
            <p style="color:#888; margin-top:10px;">Раздел находится в разработке</p>
        </div>`;
      }

      document.getElementById('linesLoader').classList.remove('visible');
      modalContentArea.classList.add('visible');
    }

    // === ЛОГИКА MODAL 9 (Новый дизайн) ===
    function initModal9Logic() {
      const container = document.getElementById('specs-container');
      if (!container) return;

      // Кнопка добавления демо-данных
      document.getElementById('btn-add-dummy')?.addEventListener('click', () => {
        addRow({
          id: Math.floor(Math.random() * 100),
          name: 'Новое оборудование ' + Math.floor(Math.random() * 100),
          qty: Math.floor(Math.random() * 10) + 1,
          unit: 'шт.',
          params: [
            {k: 'Модель', v: 'Series X'},
            {k: 'Гарантия', v: '3 года'},
            {k: 'Цвет', v: 'Черный'}
          ]
        });
      });

      // Загрузка демо при старте
      mockData.forEach(addRow);
      
      // Инициализация слайдеров для существующих элементов
      initializeAllSliders(container);
    }

    function addRow(item) {
      const container = document.getElementById('specs-container');
      const row = document.createElement('div');
      row.className = 'spec-row-item';
      row.innerHTML = `
        <!-- Левый блок -->
        <div class="spec-left-block">
          <div class="spec-id-name-qty">
            <div class="spec-pos-num">${item.id}</div>
            <div class="spec-main-info">
              <div class="spec-name">${item.name}</div>
              <div class="spec-qty">${item.qty} ${item.unit}</div>
            </div>
          </div>
        </div>

        <!-- Средний блок (Параметры) -->
        <div class="spec-params-block">
          ${item.params.map(p => `
            <div class="param-row">
              <span class="param-key">${p.k}:</span>
              <span class="param-val">${p.v}</span>
            </div>
          `).join('')}
        </div>

        <!-- Правый блок (Слайдер) -->
        <div class="spec-right-block">
          <div class="slideshow-container">
            <div class="slide active">
              <img src="https://iili.io/KkPp5kQ.jpg" alt="Slide 1">
              <div class="overlay-slide"></div>
              <div class="caption">Парсинг данных</div>
            </div>
            <div class="slide">
              <img src="https://iili.io/KkPpA2j.jpg" alt="Slide 2">
              <div class="overlay-slide"></div>
              <div class="caption">Анализ цен</div>
            </div>
            <div class="slide">
              <img src="https://iili.io/KkPpRYx.jpg" alt="Slide 3">
              <div class="overlay-slide"></div>
              <div class="caption">Результаты</div>
            </div>

            <a class="prev">&#10094;</a>
            <a class="next">&#10095;</a>

            <div class="dots-container">
              <div class="dot active" data-index="0"></div>
              <div class="dot" data-index="1"></div>
              <div class="dot" data-index="2"></div>
            </div>
          </div>
        </div>
      `;
      container.appendChild(row);
      
      // Инициализируем слайдер только что добавленного ряда
      const slider = row.querySelector('.slideshow-container');
      initSingleSlider(slider);
    }

    // === Логика Слайдера ===
    function initializeAllSliders(scope) {
      scope.querySelectorAll('.slideshow-container').forEach(initSingleSlider);
    }

    function initSingleSlider(container) {
      if (!container || container.dataset.init) return;
      container.dataset.init = 'true';

      const slides = container.querySelectorAll('.slide');
      const dots = container.querySelectorAll('.dot');
      const prevBtn = container.querySelector('.prev');
      const nextBtn = container.querySelector('.next');
      let index = 0;
      let autoPlayTimer = null;

      function showSlide(n) {
        // Сброс предыдущего
        slides[index].classList.remove('active');
        dots[index].classList.remove('active');
        
        // Расчет индекса
        index = (n + slides.length) % slides.length;
        
        // Установка нового
        slides[index].classList.add('active');
        dots[index].classList.add('active');
      }

      function startAutoPlay() {
        stopAutoPlay();
        autoPlayTimer = setInterval(() => showSlide(index + 1), 6000);
      }

      function stopAutoPlay() {
        if (autoPlayTimer) clearInterval(autoPlayTimer);
      }

      // События
      prevBtn.addEventListener('click', () => {
        showSlide(index - 1);
        startAutoPlay(); // Сброс таймера
      });

      nextBtn.addEventListener('click', () => {
        showSlide(index + 1);
        startAutoPlay();
      });

      dots.forEach(dot => {
        dot.addEventListener('click', () => {
          showSlide(parseInt(dot.dataset.index));
          startAutoPlay();
        });
      });

      // Пауза при наведении
      container.addEventListener('mouseenter', stopAutoPlay);
      container.addEventListener('mouseleave', startAutoPlay);

      startAutoPlay();
    }

    // === Three.js фон (Сохранен из оригинала) ===
    // (Код инициализации фона вынесен в конец, сохранен как есть, просто переносим в script)
    
    const THREE_SCRIPT = document.createElement('script');
    THREE_SCRIPT.src = 'https://unpkg.com/three@0.130.1/build/three.min.js';
    document.body.appendChild(THREE_SCRIPT);

    THREE_SCRIPT.onload = () => {
      const SEPARATION = 200, AMOUNTX = 40, AMOUNTY = 60;
      const AMP_X = 50, AMP_Y = 50;
      const FREQ_X = 0.3, FREQ_Y = 0.5, WAVE_SPEED = 0.025;
      const POINT_SIZE = 10, POINT_COLOR = 0x000000; // Черные точки для черно-белой темы
      
      let camera, scene, renderer, points, count = 0;

      function initWave() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 355, 122);

        renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('home_wave').appendChild(renderer.domElement);

        const positions = [];
        for (let ix = 0; ix < AMOUNTX; ix++) {
          for (let iy = 0; iy < AMOUNTY; iy++) {
            positions.push(ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2), 0, iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2));
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({ color: POINT_COLOR, size: POINT_SIZE, sizeAttenuation: true });
        points = new THREE.Points(geometry, material);
        scene.add(points);

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animateWave();
      }

      function animateWave() {
        requestAnimationFrame(animateWave);
        const pos = points.geometry.attributes.position.array;
        let i = 0;
        for (let ix = 0; ix < AMOUNTX; ix++) {
          for (let iy = 0; iy < AMOUNTY; iy++) {
            pos[i + 1] = (Math.sin((ix + count) * FREQ_X) * AMP_X) + (Math.sin((iy + count) * FREQ_Y) * AMP_Y);
            i += 3;
          }
        }
        points.geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
        count += WAVE_SPEED;
      }
      
      initWave();
    };

  </script>
</body>
