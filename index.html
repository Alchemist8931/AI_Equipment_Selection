<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Equipment Selection APP</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  
  <style>
    :root {
      --form-width: 850px;
      --form-height: 550px;
      --overlay-width: 380px;
      
      /* Dark Tech Theme */
      --bg-primary: #000000;
      --bg-card: #0f0f0f;
      --bg-input: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --border-color: #2a2a2a;
      --accent: #ffffff;
      --accent-hover: #e0e0e0;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
      
      /* Layout */
      --content-max-width: 1300px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SN Pro', sans-serif; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* --- Background Animation --- */
    #home_wave { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.2; pointer-events: none; }

    /* --- Preloader --- */
    #preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; gap: 8px; 
      opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; z-index: 9999;
      background: var(--bg-primary);
    }
    #preloader.visible { opacity: 1; visibility: visible; }
    .line {
      width: 4px; height: 40px; background-color: var(--text-primary); 
      animation: bounce 1.2s infinite ease-in-out; border-radius: 2px;
    }
    .line:nth-child(2) { animation-delay: 0.1s; }
    .line:nth-child(3) { animation-delay: 0.2s; }
    .line:nth-child(4) { animation-delay: 0.3s; }
    .line:nth-child(5) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 40%, 100% { transform: scaleY(0.4); } 20% { transform: scaleY(1.0); } }

    /* --- Menu --- */
    .navigation {
      position: fixed; top: 20px; left: 20px; height: calc(100vh - 40px); width: 70px; z-index: 1200;
      border-radius: 16px; background: rgba(20, 20, 20, 0.8); border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      transition: width 0.3s ease; overflow: hidden;
    }
    .navigation ul { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; padding: 10px 0; }
    .navigation ul li { position: relative; list-style: none; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; }
    .navigation ul li a { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; text-decoration: none; color: var(--text-secondary); transition: color 0.2s; }
    .navigation ul li.active a { color: var(--text-primary); }
    .navigation ul li a .icon { font-size: 24px; z-index: 2; }
    .navigation ul li a .title {
      position: absolute; left: 80px; top: 50%; transform: translateY(-50%); background: var(--bg-card);
      border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3); white-space: nowrap; font-size: 12px; font-weight: 600;
      opacity: 0; visibility: hidden; transition: all 0.2s ease; pointer-events: none; z-index: 10;
    }
    .navigation ul li:hover a .title { opacity: 1; visibility: visible; left: 70px; }
    .navigation ul .indicator {
      position: absolute; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.05);
      border-radius: 12px; top: 17px; left: 10px; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
    }

    /* --- Login --- */
    #login-wrapper { position: relative; z-index: 100; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; opacity: 0; transition: opacity 0.5s; }
    #login-wrapper.show { opacity: 1; }
    .container {
      width: var(--form-width); height: var(--form-height); position: relative; background: var(--bg-card);
      border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; z-index: 100;
      border: 1px solid var(--border-color); display: flex;
    }
    .overlay {
      position: absolute; top: 0; left: 0; width: var(--overlay-width); height: 100%; background: var(--text-primary);
      border-radius: 20px 0 0 20px; transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1), border-radius 0.6s ease;
      z-index: 10; color: var(--bg-primary); display: flex; flex-direction: column; justify-content: center; padding: 40px;
    }
    .overlay.open-sign-up { left: calc(var(--form-width) - var(--overlay-width)); border-radius: 0 20px 20px 0; }
    .overlay h3 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .overlay p { font-size: 13px; color: rgba(0,0,0,0.7); line-height: 1.5; margin-bottom: 20px; }
    
    .form-container {
      flex: 1; margin-left: var(--overlay-width); display: flex; position: relative; transition: margin-left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-box {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px;
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .form-box.active { opacity: 1; pointer-events: auto; }

    .modalFORM { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 320px; }
    .modalFORM h3 { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }

    .input-container { position: relative; width: 100%; }
    .styled_input_bar {
      width: 100%; padding: 14px 16px; font-size: 14px; font-family: 'SN Pro', sans-serif;
      border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-input);
      color: var(--text-primary); outline: none; transition: all 0.3s ease;
    }
    .styled_input_bar:focus { border-color: var(--text-primary); background-color: #222; box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05); }
    .input-label {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 14px;
      color: var(--text-muted); pointer-events: none; transition: all 0.2s ease; background: transparent; padding: 0 4px;
    }
    .styled_input_bar:focus + .input-label, .styled_input_bar:not(:placeholder-shown) + .input-label {
      top: 0; left: 12px; font-size: 11px; font-weight: 500; background-color: var(--bg-card); color: var(--text-secondary);
    }

    .button-submit { width: 100%; padding: 14px 24px; background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 8px; }
    .button-submit:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .button-submit2 { width: 100%; padding: 12px; background-color: transparent; border: 1px solid var(--bg-primary); color: var(--bg-primary); font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; }
    .button-submit2:hover { background-color: rgba(0,0,0,0.1); }

    /* --- Modal Content (Main App) --- */
    .modal-window {
      position: fixed; display: none; flex-direction: column;
      top: 20px; left: 100px; right: 20px; bottom: 20px; 
      background-color: rgba(15, 15, 15, 0.95); border: 1px solid var(--border-color); border-radius: 20px;
      overflow: hidden; z-index: 1100; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* Fixed Width Logic */
    .modal-body-wrapper {
      flex: 1; overflow-y: auto; overflow-x: hidden; 
      display: flex; justify-content: center; /* Centering the fixed width content */
      padding: 20px 0;
    }
    
    .content-area {
      width: var(--content-max-width); /* Fixed width */
      opacity: 0; transition: opacity 0.5s ease; 
      position: relative; z-index: 1; padding: 0 20px;
    }
    .content-area.visible { opacity: 1; }

    /* --- Spec Structure Styles --- */
    
    /* Top Controls */
    .modal9-top-window { padding: 0 0 20px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; }
    .modal9-top-body { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
    
    .file-upload__modal { display: flex; gap: 10px; }
    .darkmatter-btn { background: var(--text-primary); border: none; color: var(--bg-primary); padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .darkmatter-btn:hover { background: #ddd; }
    
    .button-group { display: flex; gap: 15px; align-items: center; margin-top: 10px; width: 100%; }
    .file-filter-container { flex: 1; max-width: 400px; }
    
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 22px; }
    .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .toggle-slider { background-color: var(--text-primary); }
    input:checked + .toggle-slider:before { transform: translateX(18px); }

    /* History List */
    .history-list { display: flex; flex-direction: column; gap: 15px; }
    
    /* Spec Row Container (New Structure) */
    .spec-row-item {
      display: flex; 
      background: #141414; 
      border: 1px solid #222;
      border-radius: 12px; 
      overflow: hidden; 
      margin-bottom: 15px;
      height: 250px; /* Fixed height for consistent slider */
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: border-color 0.3s;
    }
    .spec-row-item:hover { border-color: #444; }

    /* 1. Left Part: Info */
    .spec-info-col {
      width: 250px; 
      flex-shrink: 0;
      padding: 20px; 
      border-right: 1px solid #222;
      display: flex; flex-direction: column; justify-content: center; gap: 12px;
    }
    .spec-num { font-size: 12px; color: var(--text-muted); font-family: 'Montserrat', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
    .spec-name { font-size: 16px; font-weight: 600; line-height: 1.3; color: var(--text-primary); }
    .spec-qty { font-size: 14px; color: var(--text-secondary); margin-top: auto; }
    .spec-qty span { color: var(--text-primary); font-weight: 600; margin-left: 5px; }

    /* 2. Middle Part: Params */
    .spec-params-col {
      width: 300px; 
      flex-shrink: 0;
      background: #0a0a0a;
      padding: 15px;
      border-right: 1px solid #222;
      overflow-y: auto;
    }
    .param-row {
      display: flex; justify-content: space-between; 
      padding: 8px 0; border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
    }
    .param-row:last-child { border-bottom: none; }
    .param-key { color: var(--text-muted); margin-right: 10px; }
    .param-val { color: var(--text-secondary); text-align: right; }

    /* 3. Right Part: Slider (Blocks) */
    .spec-slider-col {
      flex: 1; 
      position: relative; 
      background: #000;
    }

    /* Integrated Slider Styles */
    .slideshow-container {
      position: relative; width: 100%; height: 100%; overflow: hidden;
    }
    .slide {
      position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 1s ease;
    }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 1; }
    .slide img {
      width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(100%) contrast(1.1) brightness(0.6); 
      transform: scale(1.05); transition: transform 10s linear;
    }
    .slide.active img { transform: scale(1); }
    .overlay {
      position: absolute; inset: 0; 
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
      z-index: 1;
    }
    .caption {
      position: absolute; bottom: 30px; left: 30px; z-index: 2;
      font-family: 'Montserrat', sans-serif; color: #fff;
    }
    .caption-title { font-size: 18px; font-weight: 700; margin-bottom: 5px; opacity: 0; transform: translateY(10px); transition: all 0.5s 0.3s; }
    .caption-sub { font-size: 12px; color: #aaa; opacity: 0; transform: translateY(10px); transition: all 0.5s 0.4s; }
    .slide.active .caption-title, .slide.active .caption-sub { opacity: 1; transform: translateY(0); }

    /* Navigation */
    .nav-arrows { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; display: flex; justify-content: space-between; padding: 0 10px; z-index: 2; pointer-events: none; }
    .prev, .next {
      cursor: pointer; color: #fff; font-size: 16px; padding: 8px 12px; border-radius: 6px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); transition: all 0.3s; pointer-events: auto;
      display: flex; align-items: center; justify-content: center; user-select: none;
    }
    .prev:hover, .next:hover { background: rgba(255,255,255,0.3); }

    .dots-container {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 2;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s;
    }
    .dot.active { background: #fff; transform: scale(1.4); }

    /* Loader */
    .lines-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 8px; opacity: 0; visibility: hidden; z-index: 1200; }
    .lines-loader.visible { opacity: 1; visibility: visible; }
    .lineLM { width: 3px; height: 30px; background-color: var(--text-primary); animation: bounce 1.2s infinite ease-in-out; border-radius: 2px; }

    /* Context Menu */
    .spec-context-menu { position: fixed; display: none; min-width: 180px; background: #222; border: 1px solid #333; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 4000; padding: 8px 0; }
    .spec-context-menu.visible { display: block; }
    .spec-context-menu button { width: 100%; padding: 8px 16px; background: none; border: none; color: #ccc; text-align: left; font-size: 13px; cursor: pointer; }
    .spec-context-menu button:hover { background: #333; color: #fff; }
    
    /* Progress */
    .spec-progress { display: flex; gap: 20px; padding: 0 10px 15px; }
    .step { flex: 1; }
    .step .bar { height: 2px; background: #333; border-radius: 1px; overflow: hidden; margin-bottom: 8px; }
    .step.active .bar { background: #fff; }
    .step-body { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #666; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="home_wave"></div>
  
  <div id="preloader">
    <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
  </div>

  <!-- Menu -->
  <div id="side-menu" style="display:none;">
    <div class="navigation">
      <ul>
        <li class="navbar__item active" data-levels="PAGE9" data-modal="modal9">
          <a href="#">
            <span class="icon material-symbols-outlined">grid_view</span>
            <span class="title">SPECIFICATIONS</span>
          </a>
        </li>
        <div class="indicator"></div>
      </ul>
    </div>
  </div>

  <!-- Main Content Window -->
  <div id="right-modal" class="modal-window">
    <div class="lines-loader" id="linesLoader">
      <div class="lineLM"></div><div class="lineLM"></div><div class="lineLM"></div><div class="lineLM"></div>
    </div>
    
    <div class="modal-body-wrapper">
      <div class="content-area" id="modalContentArea">
        
        <!-- Header Controls -->
        <div class="modal9-top-window">
          <div class="modal9-top-body">
            <div class="file-upload__modal">
              <form class="file-upload-form js-dropzone">
                <label class="file-upload-label">
                  <div class="file-upload-design" style="display:flex; gap:10px;">
                    <button type="button" class="darkmatter-btn browse-button">
                      <span class="material-symbols-outlined" style="font-size:16px;">upload</span>
                      выбрать файл
                    </button>
                    <button type="button" class="darkmatter-btn upload-btn" style="background:#333; color:#fff;">
                      <span class="button-text">загрузить</span>
                    </button>
                  </div>
                  <input type="file" class="js-file__input" style="display:none;" />
                </label>
              </form>
            </div>
            
            <div class="button-group">
              <div class="file-filter-container input-container">
                <input id="file-filter-input" class="styled_input_bar" placeholder=" " />
                <label class="input-label">поиск по названию или №</label>
              </div>
              <label class="switch" title="Только мои файлы">
                <input type="checkbox" id="my-files-toggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- Context Menu -->
        <div class="spec-context-menu" id="contextMenu">
          <button type="button" data-action="copy">Копировать</button>
          <button type="button" data-action="excel">Excel</button>
        </div>

        <!-- History List (Container) -->
        <div class="history-list spec-history-list"></div>
        
        <!-- Templates -->
        <template id="history-row-template">
           <div class="spec-row-item" data-spec-id="">
             <!-- Part 1: Info -->
             <div class="spec-info-col">
               <div class="spec-num">№ <span data-field="pos_number"></span></div>
               <div class="spec-name" data-field="name"></div>
               <div class="spec-qty">Кол-во: <span data-field="qty"></span></div>
               <div style="font-size:10px; color:#666; margin-top:5px;" data-field="file_name"></div>
             </div>
             
             <!-- Part 2: Params -->
             <div class="spec-params-col params-container">
               <!-- Params injected here -->
             </div>

             <!-- Part 3: Slider (3 Blocks) -->
             <div class="spec-slider-col">
               <div class="slideshow-container">
                 <!-- Slide 1 -->
                 <div class="slide active">
                   <img src="https://iili.io/KkPp5kQ.jpg" alt="Block 1">
                   <div class="overlay"></div>
                   <div class="caption">
                     <div class="caption-title">Предложение 1</div>
                     <div class="caption-sub sub-1">--</div>
                   </div>
                 </div>
                 <!-- Slide 2 -->
                 <div class="slide">
                   <img src="https://iili.io/KkPpA2j.jpg" alt="Block 2">
                   <div class="overlay"></div>
                   <div class="caption">
                     <div class="caption-title">Предложение 2</div>
                     <div class="caption-sub sub-2">--</div>
                   </div>
                 </div>
                 <!-- Slide 3 -->
                 <div class="slide">
                   <img src="https://iili.io/KkPpRYx.jpg" alt="Block 3">
                   <div class="overlay"></div>
                   <div class="caption">
                     <div class="caption-title">Предложение 3</div>
                     <div class="caption-sub sub-3">--</div>
                   </div>
                 </div>

                 <!-- Navs -->
                 <div class="nav-arrows">
                   <a class="prev">&#10094;</a>
                   <a class="next">&#10095;</a>
                 </div>
                 <div class="dots-container">
                   <div class="dot active" data-index="0"></div>
                   <div class="dot" data-index="1"></div>
                   <div class="dot" data-index="2"></div>
                 </div>
               </div>
             </div>
           </div>
        </template>
        
        <template id="param-row-template">
          <div class="param-row">
            <div class="param-key"></div>
            <div class="param-val"></div>
          </div>
        </template>

      </div>
    </div>
  </div>

  <!-- Login Form -->
  <div id="login-wrapper" class="show">
    <div class="container">
      <div class="overlay" id="overlay">
        <div class="sign-in">
          <h3>Новый пользователь?</h3>
          <p>Создайте аккаунт для доступа к функционалу.</p>
          <button class="button-submit2" id="slide-right-button">Регистрация</button>
        </div>
        <div class="sign-up" style="display:none;">
          <h3>Есть аккаунт?</h3>
          <p>Войдите в систему.</p>
          <button class="button-submit2" id="slide-left-button">Войти</button>
        </div>
      </div>
      
      <div class="form-container">
        <!-- Register -->
        <div class="form-box" id="sign-in-info">
           <h2 style="font-size: 18px; color: var(--text-secondary); margin-bottom: 30px; letter-spacing: 2px;">AI SELECTION</h2>
          <form id="registration-form">
            <div class="modalFORM">
              <h3>Регистрация</h3>
              <div class="input-container">
                <input class="styled_input_bar" type="text" name="lastname" placeholder=" " />
                <label class="input-label">Фамилия</label>
              </div>
              <div class="input-container">
                <input class="styled_input_bar" type="text" name="firstname" placeholder=" " />
                <label class="input-label">Имя</label>
              </div>
              <div class="input-container">
                <input class="styled_input_bar" type="email" name="email" placeholder=" " />
                <label class="input-label">Email</label>
              </div>
              <div class="input-container">
                <input class="styled_input_bar" type="password" name="password" placeholder=" " />
                <label class="input-label">Пароль</label>
              </div>
              <button class="button-submit">Создать</button>
            </div>
          </form>
        </div>
        
        <!-- Login -->
        <div class="form-box active" id="sign-up-info">
          <h2 style="font-size: 18px; color: var(--text-secondary); margin-bottom: 30px; letter-spacing: 2px;">AI SELECTION</h2>
          <form id="login-form">
            <div class="modalFORM">
              <h3>Вход</h3>
              <div class="input-container">
                <input class="styled_input_bar" type="email" id="loginEmail" placeholder=" " />
                <label class="input-label">Email</label>
              </div>
              <div class="input-container">
                <input class="styled_input_bar" type="password" id="loginPassword" placeholder=" " />
                <label class="input-label">Пароль</label>
              </div>
              <button class="button-submit" id="loginBtn" type="button">Войти</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.130.1/build/three.min.js"></script>
  <script type="module">
    // Mock Supabase for demo
    const mockSupabase = {
      auth: {
        getSession: async () => ({ data: { session: { access_token: 'mock_token' } } }),
        signInWithPassword: async () => ({ data: { user: { id: '123' } } }),
        signUp: async () => ({ data: {} })
      },
      from: (table) => ({
        select: () => ({
          order: () => ({
            limit: async () => ({ data: [
              { id: 1, pos_number: '01', name: 'Насос центробежный GRUNDFOS CR 15-3', qty: 2, file_name: 'project_alpha.docx', params: 'Мощность&0.37 кВт|Напряжение&220В|Производительность&3 м3/ч' },
              { id: 2, pos_number: '02', name: 'Клапан обратный фланцевый Ду50', qty: 5, file_name: 'project_alpha.docx', params: 'Материал&Чугун|Давление&16 бар|Тип&Затвор' },
              { id: 3, pos_number: '03', name: 'Труба стальная бесшовная', qty: '12 м', file_name: 'project_beta.xlsx', params: 'Диаметр&108 мм|Стенка&4 мм|Сталь&09Г2С' },
            ], error: null })
          })
        }),
        insert: async () => ({ data: { id: 4 }, error: null }),
        update: async () => ({ error: null })
      }),
      storage: { from: () => ({ upload: async () => ({ error: null }) }) }
    };
    window.supabase = mockSupabase;

    // Logic
    const preloader = document.getElementById('preloader');
    const loginWrapper = document.getElementById('login-wrapper');
    const sideMenu = document.getElementById('side-menu');
    const rightModal = document.getElementById('right-modal');
    const modalContentArea = document.getElementById('modalContentArea');
    const linesLoader = document.getElementById('linesLoader');
    
    // Slider Logic Class
    class SpecSlider {
      constructor(container) {
        this.slides = container.querySelectorAll('.slide');
        this.dots = container.querySelectorAll('.dot');
        this.prevBtn = container.querySelector('.prev');
        this.nextBtn = container.querySelector('.next');
        this.index = 0;
        this.interval = null;
        
        this.init();
      }
      
      showSlide(n) {
        this.slides[this.index].classList.remove('active');
        this.dots[this.index].classList.remove('active');
        this.index = (n + this.slides.length) % this.slides.length;
        this.slides[this.index].classList.add('active');
        this.dots[this.index].classList.add('active');
      }
      
      next() { this.showSlide(this.index + 1); }
      prev() { this.showSlide(this.index - 1); }
      
      startAuto() { this.interval = setInterval(() => this.next(), 5000); }
      stopAuto() { clearInterval(this.interval); }
      
      init() {
        this.prevBtn.addEventListener('click', (e) => { e.stopPropagation(); this.stopAuto(); this.prev(); this.startAuto(); });
        this.nextBtn.addEventListener('click', (e) => { e.stopPropagation(); this.stopAuto(); this.next(); this.startAuto(); });
        this.dots.forEach(dot => {
          dot.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            this.stopAuto(); 
            this.showSlide(parseInt(dot.dataset.index)); 
            this.startAuto(); 
          });
        });
        this.startAuto();
      }
    }

    // Auth Mock
    document.getElementById('loginBtn').addEventListener('click', async () => {
      linesLoader.classList.add('visible');
      loginWrapper.classList.remove('show');
      
      setTimeout(() => {
        linesLoader.classList.remove('visible');
        sideMenu.style.display = 'block';
        rightModal.style.display = 'flex';
        modalContentArea.classList.add('visible');
        initApp();
        initIndicator();
      }, 1500);
    });

    // Toggle Login/Register
    const overlay = document.getElementById('overlay');
    const signInInfo = document.getElementById('sign-in-info');
    const signUpInfo = document.getElementById('sign-up-info');
    
    document.getElementById('slide-right-button').addEventListener('click', () => {
      overlay.classList.add('open-sign-up');
      signUpInfo.classList.remove('active');
      signInInfo.classList.add('active');
      overlay.querySelector('.sign-in').style.display = 'none';
      overlay.querySelector('.sign-up').style.display = 'flex';
    });
    
    document.getElementById('slide-left-button').addEventListener('click', () => {
      overlay.classList.remove('open-sign-up');
      signInInfo.classList.remove('active');
      signUpInfo.classList.add('active');
      overlay.querySelector('.sign-in').style.display = 'flex';
      overlay.querySelector('.sign-up').style.display = 'none';
    });

    // App Logic
    async function initApp() {
      const historyList = document.querySelector('.history-list');
      const rowTemplate = document.querySelector('#history-row-template');
      const paramTemplate = document.querySelector('#param-row-template');
      
      // Mock Data Load
      const { data: specs } = await supabase.from('specs').select().order().limit();
      
      historyList.innerHTML = '';
      
      specs.forEach(spec => {
        const clone = rowTemplate.content.cloneNode(true);
        const row = clone.querySelector('.spec-row-item');
        row.dataset.specId = spec.id;
        
        // Fill Left & Center
        clone.querySelector('[data-field="pos_number"]').textContent = spec.pos_number;
        clone.querySelector('[data-field="name"]').textContent = spec.name;
        clone.querySelector('[data-field="qty"]').textContent = spec.qty;
        clone.querySelector('[data-field="file_name"]').textContent = spec.file_name;
        
        const paramsContainer = clone.querySelector('.params-container');
        const params = spec.params.split('|');
        params.forEach(p => {
          const [key, val] = p.split('&');
          const pClone = paramTemplate.content.cloneNode(true);
          pClone.querySelector('.param-key').textContent = key;
          pClone.querySelector('.param-val').textContent = val;
          paramsContainer.appendChild(pClone);
        });

        // Init Slider Logic on the row
        historyList.appendChild(clone);
        // Need to select the newly added row to init slider
        const addedRow = historyList.lastElementChild;
        const sliderContainer = addedRow.querySelector('.slideshow-container');
        new SpecSlider(sliderContainer);
      });
    }
    
    // Indicator Logic
    function initIndicator() {
      const indicator = document.querySelector('.indicator');
      const items = document.querySelectorAll('.navbar__item');
      const first = items[0];
      indicator.style.top = (first.offsetTop + 5) + 'px';
      indicator.style.left = '10px';
      indicator.style.width = '50px';
    }

    // Three.js Background
    const SEPARATION = 100, AMOUNTX = 50, AMOUNTY = 50;
    let camera, scene, renderer, points, count = 0;
    
    function initBg() {
      const container = document.getElementById('home_wave');
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
      camera.position.z = 1000;
      camera.position.y = 300;
      camera.rotation.x = -0.2;
      
      scene = new THREE.Scene();
      const positions = [];
      for(let i=0; i<AMOUNTX; i++) {
        for(let j=0; j<AMOUNTY; j++) {
          positions.push(i * SEPARATION - ((AMOUNTX * SEPARATION)/2), 0, j * SEPARATION - ((AMOUNTY * SEPARATION)/2));
        }
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      const material = new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0.5 });
      points = new THREE.Points(geometry, material);
      scene.add(points);
      renderer = new THREE.WebGLRenderer({ alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      animate();
    }
    
    function animate() {
      requestAnimationFrame(animate);
      const positions = points.geometry.attributes.position.array;
      let i = 0;
      for(let ix=0; ix<AMOUNTX; ix++) {
        for(let iy=0; iy<AMOUNTY; iy++) {
          positions[i+1] = (Math.sin((ix+count)*0.3) * 50) + (Math.sin((iy+count)*0.5) * 50);
          i+=3;
        }
      }
      points.geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
      count += 0.05;
    }
    
    initBg();
    
    // Preloader
    window.addEventListener('load', () => {
      setTimeout(() => {
        preloader.classList.add('fade-out');
        setTimeout(() => { preloader.style.display = 'none'; loginWrapper.classList.add('show'); }, 500);
      }, 1000);
    });

  </script>
</body>
</html>
